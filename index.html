<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PayZip - Smart Expense & Payment Tracker</title>
  <!-- CSS inside public folder -->
  <link rel="stylesheet" href="public/style.css">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <header>
    <h1>Welcome to PayZip</h1>
    <button onclick="login()">Login</button>
  </header>

  <main>
    <h2>Manage Your Office Expenses</h2>
  
    <!-- Expense Form -->
    <form id="expenseForm">
      <input type="text" id="desc" placeholder="Expense Description" required>
      <input type="number" id="amount" placeholder="Amount (INR)" required>
      <button type="submit">Add Expense</button>
    </form>
  
    <!-- Razorpay Payment Button -->
    <button class="pay-btn" onclick="initiatePayment()">Initiate Payment</button>
  </main>

  <!-- JS inside public folder -->
  <script src="public/app.js"></script>
  <script src="public/auth.js"></script>
  <script src="public/payments.js"></script>
</body>
</html>
