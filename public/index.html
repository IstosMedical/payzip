<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PayZip - Smart Expense & Payment Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <header>
    <h1>Welcome to PayZip</h1>
    <button onclick="login()">Login</button>
  </header>

  <main>
    <h2>Track Expenses & Initiate Payments</h2>
    <form id="expenseForm">
      <input type="text" id="desc" placeholder="Expense Description" required>
      <input type="number" id="amount" placeholder="Amount" required>
      <button type="submit">Add Expense</button>
    </form>

    <button onclick="initiatePayment()">Pay with Razorpay</button>
  </main>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script src="payments.js"></script>
</body>
</html>
